<!DOCTYPE html>
<html>
<head>
    <title>Codex — Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0b0b; color: white; font-family: Arial, sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative; overflow: hidden; padding: 60px 16px 24px;
        }
        .bg-text {
            position: fixed; font-size: clamp(80px, 22vw, 280px);
            font-weight: 900; color: #e63232; letter-spacing: 10px;
            opacity: 0.05; user-select: none; pointer-events: none;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            white-space: nowrap; z-index: 0;
        }
        .top-bar {
            position: fixed; top: 0; left: 0; right: 0;
            background: #0f0f0f; border-bottom: 1px solid #1a1a1a;
            text-align: center; font-size: 12px; color: #888;
            padding: 9px 16px; z-index: 10;
        }
        .top-bar a { color: #e63232; text-decoration: none; font-weight: 600; }

        .auth-card {
            position: relative; z-index: 2; background: #111;
            border: 1px solid #1e1e1e; border-radius: 16px;
            padding: 36px 32px; width: 100%; max-width: 400px; text-align: center;
        }
        .card-logo { font-size: 32px; font-weight: 900; color: #e63232; letter-spacing: 6px; margin-bottom: 4px; }
        .card-sub { font-size: 11px; color: #555; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 24px; }
        .card-title { font-size: 19px; font-weight: 700; color: #fff; margin-bottom: 22px; }

        .form-group { margin-bottom: 14px; text-align: left; }
        .form-group label { display: block; font-size: 11px; color: #666; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
        .form-group input {
            width: 100%; padding: 12px 14px;
            background: #1a1a1a !important; border: 1px solid #2a2a2a !important;
            border-radius: 8px; color: white !important; font-size: 14px;
            outline: none; transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: #e63232 !important; box-shadow: 0 0 0 3px rgba(230,50,50,0.08) !important; }

        .submit-btn {
            width: 100%; padding: 13px; background: #e63232; color: white;
            border: none; border-radius: 8px; font-size: 15px; font-weight: 700;
            cursor: pointer; margin-top: 6px; transition: background 0.2s;
        }
        .submit-btn:hover { background: #c52a2a; }

        .divider {
            display: flex; align-items: center; gap: 10px;
            margin: 18px 0; color: #333; font-size: 12px;
        }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #1e1e1e; }

        .switch-text { font-size: 13px; color: #555; margin-top: 16px; }
        .switch-text a { color: #e63232; text-decoration: none; font-weight: 600; }

        .back-home {
            position: fixed; top: 46px; left: 20px;
            font-size: 13px; color: #555; text-decoration: none; z-index: 10;
            transition: color 0.2s;
        }
        .back-home:hover { color: #aaa; }

        @media (max-width: 480px) {
            body { padding: 56px 14px 20px; }
            .auth-card { padding: 28px 20px; border-radius: 14px; }
            .card-logo { font-size: 26px; }
            .card-title { font-size: 17px; }
            .form-group input { padding: 11px 12px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="bg-text">CODEX</div>
    <div class="top-bar">
        🔥 Codex Alpha is live — donate, resell, and find books fast.
        <a href="#">Sell your books</a> or <a href="#">donate now</a>.
    </div>
    <a href="/" class="back-home">← Back</a>

    <div class="auth-card">
        <div class="card-logo">CODEX</div>
        <div class="card-sub">Alpha</div>
        <h2 class="card-title">Welcome back</h2>
        <form method="post">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="submit-btn">Sign In</button>
        </form>
        <div class="divider">or</div>
        <p class="switch-text">Don't have an account? <a href="/signup">Sign up free</a></p>
    </div>
</body>
</html>
