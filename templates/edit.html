<!DOCTYPE html>
<html>

<head>
    <title>Edit Book</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <h2>Edit Book</h2>

        <form method="post" action="/update/{{ book.id }}">
            <input type="text" name="title" value="{{ book.title }}" placeholder="Title">
            <input type="text" name="author" value="{{ book.author }}" placeholder="Author">
            <input type="number" name="price" value="{{ book.price }}" placeholder="Price">
            <button type="submit" class="add-btn">Update Book</button>
        </form>
    </div>
</body>

</html>
