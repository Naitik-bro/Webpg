<!DOCTYPE html>
<html>

<head>
    <title>Codex — Welcome</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0b0b;
            color: white;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Giant background CODEX */
        .bg-text {
            position: fixed;
            font-size: clamp(130px, 24vw, 280px);
            font-weight: 900;
            color: #e63232;
            letter-spacing: 12px;
            opacity: 0.06;
            user-select: none;
            pointer-events: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            white-space: nowrap;
            z-index: 0;
        }

        /* Top bar */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #0f0f0f;
            border-bottom: 1px solid #1a1a1a;
            text-align: center;
            font-size: 13px;
            color: #888;
            padding: 9px 16px;
            z-index: 10;
        }

        .top-bar a {
            color: #e63232;
            text-decoration: none;
            font-weight: 600;
        }

        /* Center content */
        .auth-wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 0;
        }

        .main-logo {
            font-size: clamp(80px, 15vw, 150px);
            font-weight: 900;
            color: #e63232;
            letter-spacing: 8px;
            line-height: 1;
            margin-bottom: 12px;
            text-shadow:
                0 0 80px rgba(230, 50, 50, 0.3),
                0 0 160px rgba(230, 50, 50, 0.12);
        }

        .alpha-badge {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #666;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            padding: 3px 10px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 16px;
            color: #777;
            margin-bottom: 40px;
            letter-spacing: 0.3px;
        }

        .tagline span {
            color: #aaa;
        }

        /* Auth buttons */
        .auth-buttons {
            display: flex;
            gap: 14px;
            justify-content: center;
        }

        .auth-btn {
            padding: 13px 36px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: opacity 0.2s, transform 0.15s;
            letter-spacing: 0.3px;
        }

        .auth-btn:hover {
            opacity: 0.85;
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            color: #fff;
            border: 1.5px solid #333;
        }

        .btn-outline:hover {
            border-color: #555;
            background: #141414;
        }

        .btn-red {
            background: #e63232;
            color: #fff;
        }

        /* Bottom vision label */
        .vision-label {
            position: fixed;
            bottom: 30px;
            right: 30px;
            font-size: 11px;
            letter-spacing: 3px;
            color: #333;
            text-transform: uppercase;
            z-index: 2;
        }
    </style>
</head>

<body>

    <div class="bg-text">CODEX</div>

    <div class="top-bar">
        🔥 Codex Rebel is live — donate, resell, and find books fast.
        <a href="#">Sell your books</a> or <a href="#">donate now</a>.
    </div>

    <div class="auth-wrapper">
        <h1 class="main-logo">CODEX</h1>
        <span class="alpha-badge">Rebel</span>
        <p class="tagline">The Chapter X Begins — <span>Revolutionizing how students share books.</span></p>

        <div class="auth-buttons">
            <a href="/login" class="auth-btn btn-outline">Sign in</a>
            <a href="/signup" class="auth-btn btn-red">Get Started</a>
        </div>
    </div>

    <div class="vision-label">Vision</div>

</body>

</html>
